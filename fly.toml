# fly.toml — deploy with: flyctl deploy
app = "smviruscamera"
primary_region = "sin"   # Singapore — closest to most target regions

[build]
  dockerfile = "Dockerfile"

[env]
  PORT       = "8080"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[services.tcp_checks]]
  grace_period  = "10s"
  interval      = "30s"
  restart_limit = 3
  timeout       = "5s"
